apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ldap-browser
  labels:
    app: ldap-browser
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: ldap-browser.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ldap-browser
            port:
              number: 8080

