apiVersion: apps/v1
kind: Deployment
metadata:
  name: ldap-browser
  labels:
    app: ldap-browser
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ldap-browser
  template:
    metadata:
      labels:
        app: ldap-browser
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
      - name: ldap-browser
        image: ldap-browser:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: APP_PORT
          value: "8080"
        - name: APP_AUTH_ENABLED
          value: "false"
        - name: LDAP_CONNECTION_TIMEOUT_SECONDS
          value: "10"
        - name: LOG_LEVEL
          value: "info"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL

