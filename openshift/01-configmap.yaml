apiVersion: v1
kind: ConfigMap
metadata:
  name: ldap-browser-config
  namespace: ldap-browser
  labels:
    app: ldap-browser
data:
  LOG_LEVEL: "info"
  # LDAP Connection Defaults (optional)
  # Uncomment and set these values to pre-fill the connection form
  LDAP_PROTOCOL: "ldaps"
  LDAP_HOST: "activedirectory-demo.ad.svc.cluster.local"
  LDAP_PORT: "636"
  LDAP_BIND_DN: "Administrator@sirius.com"
  LDAP_PASSWORD: STRONGpassw0rd
  # LDAP_USERNAME: ""
  LDAP_BASE_DN: "cn=users,dc=sirius,dc=com"
  # LDAP_TIMEOUT_SECONDS: "10"

