apiVersion: v1
kind: ConfigMap
metadata:
  name: ldap-browser-config
  namespace: ldap-browser
  labels:
    app: ldap-browser
data:
  LOG_LEVEL: "info"
  # LDAP Connection Defaults (optional)
  # Uncomment and set these values to pre-fill the connection form
  # LDAP_PROTOCOL: "ldap"
  # LDAP_HOST: "ldap.example.com"
  # LDAP_PORT: "389"
  # LDAP_BIND_DN: "cn=admin,dc=example,dc=com"
  # LDAP_USERNAME: ""
  # LDAP_BASE_DN: "dc=example,dc=com"
  # LDAP_TIMEOUT_SECONDS: "10"

